<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hasil GSheet</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #3eb8c1, #008080); 
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
    }
    h2 {
      margin-top: 120px;
      color: black;
      font-size: 24px;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }
    #tanggal-box {
      color: black;
      font-size: 16px;
      margin-bottom: 15px;
      text-align: center;
      font-weight: bold;
      line-height: 1.4;
    }
    #hasil-box {
      background-color: #b3b3b3;
      width: 80%;
      max-width: 400px;
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      border-radius: 4px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    td {
      padding: 6px;
      font-size: 14px;
      border: none;
    }
  </style>
</head>
<body>
  <h2>hasil</h2>
  <div id="tanggal-box">Memuat tanggal...</div>
  <div id="hasil-box">Loading data...</div>

  <script>
    const sheetId = '1BfKO4BBELtGEg6yh4Ei7LGgGJ4Ckc4c3f2KJKglahoU';
    const sheetName = 'plafon';
    const range = 'A24:D40';

    // Tambahan headers=0 biar baris awal gak hilang dianggap judul
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&headers=0&sheet=${sheetName}&range=${range}`;

    fetch(url)
      .then(response => response.text())
      .then(csvText => {
        const baris = csvText.split('\n');
        let tanggalHtml = '';
        let tabelHtml = '<table>';
        
        baris.forEach((data, index) => {
          // Pemecah kolom yang lebih aman kalau ada tanda koma di dalam teks
          const kolom = data.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(item => item.replace(/(^"|"$)/g, '').trim());
          
          if (index < 2) {
            let tglRow = [];
            if (kolom[0]) tglRow.push(kolom[0]);
            if (kolom[1]) tglRow.push(kolom[1]);
            if (tglRow.length > 0) {
              tanggalHtml += `<div>${tglRow.join(' ')}</div>`;
            }
            
            // Mengamankan data C dan D jika ada di baris 24-25 biar masuk ke kotak
            if (kolom[2] || kolom[3]) {
              tabelHtml += '<tr>';
              tabelHtml += `<td></td><td></td>`; 
              tabelHtml += `<td>${kolom[2] || ''}</td>`;
              tabelHtml += `<td>${kolom[3] || ''}</td>`;
              tabelHtml += '</tr>';
            }
          } else {
            tabelHtml += '<tr>';
            kolom.forEach(isi => {
              tabelHtml += `<td>${isi || ''}</td>`;
            });
            tabelHtml += '</tr>';
          }
        });
        
        tabelHtml += '</table>';
        
        document.getElementById('tanggal-box').innerHTML = tanggalHtml || 'Tanggal tidak ditemukan';
        document.getElementById('hasil-box').innerHTML = tabelHtml;
      })
      .catch(error => {
        document.getElementById('tanggal-box').innerHTML = '';
        document.getElementById('hasil-box').innerHTML = 'Gagal memuat data.';
        console.error(error);
      });
  </script>
</body>
</html>
