<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hasil GSheet</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #3eb8c1, #008080); 
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
    }
    h2 {
      margin-top: 120px;
      color: black;
      font-size: 24px;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }
    #tanggal-box {
      color: black;
      font-size: 16px;
      margin-bottom: 15px;
      text-align: center;
      font-weight: bold;
      line-height: 1.4;
    }
    #hasil-box {
      background-color: #b3b3b3;
      width: 80%;
      max-width: 400px;
      height: 400px;
      overflow-y: auto;
      padding: 15px;
      border-radius: 4px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    td {
      padding: 6px;
      font-size: 14px;
      border: none;
      color: #000;
      vertical-align: top;
    }
  </style>
</head>
<body>
  <h2>perhatian,dibawah ini adalah daftar toko overdue</h2>
  <div id="tanggal-box">Memuat tanggal...</div>
  <div id="hasil-box">Loading data...</div>

  <script>
    const sheetId = '1BfKO4BBELtGEg6yh4Ei7LGgGJ4Ckc4c3f2KJKglahoU';
    const sheetName = 'plafon';
    const range = 'A24:D40';

    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&headers=0&sheet=${sheetName}&range=${range}`;

    // Fungsi khusus buat pecah CSV biar teks panjang atau aneh gak bikin baris hilang
    function uraiCSV(teks) {
      let baris = [];
      let isiKolom = [""];
      let dalamKutip = false;
      
      for (let i = 0; i < teks.length; i++) {
        let huruf = teks[i];
        let hurufBerikut = teks[i+1];
        
        if (huruf === '"') {
          if (dalamKutip && hurufBerikut === '"') { 
            isiKolom[isiKolom.length - 1] += '"'; 
            i++; 
          } else { 
            dalamKutip = !dalamKutip; 
          }
        } else if (huruf === ',' && !dalamKutip) {
          isiKolom.push('');
        } else if ((huruf === '\r' || huruf === '\n') && !dalamKutip) {
          if (huruf === '\r' && hurufBerikut === '\n') { i++; }
          baris.push(isiKolom);
          isiKolom = [''];
        } else {
          isiKolom[isiKolom.length - 1] += huruf;
        }
      }
      if (isiKolom.length > 1 || isiKolom[0] !== '') baris.push(isiKolom);
      return baris;
    }

    fetch(url)
      .then(response => response.text())
      .then(csvText => {
        const semuaBaris = uraiCSV(csvText);
        let tanggalHtml = '';
        let tabelHtml = '<table>';
        
        // 1. Ambil baris 24 & 25 (index 0 & 1) khusus buat tanggal di luar kotak
        for (let i = 0; i < Math.min(2, semuaBaris.length); i++) {
          let k = semuaBaris[i];
          let tgl = `${k[0] || ''} ${k[1] || ''}`.trim();
          if (tgl) tanggalHtml += `<div>${tgl}</div>`;
        }

        // 2. Ambil baris sisanya (A26 ke bawah / index 2 sampai akhir) dimasukkan full ke kotak hasil
        for (let i = 2; i < semuaBaris.length; i++) {
          let k = semuaBaris[i];
          
          // Skip kalau baris bener-bener kosong melompong
          if (k.join('').trim() === '') continue; 
          
          tabelHtml += '<tr>';
          // Paksa keluarin sampai 4 kolom (A, B, C, D) tanpa ada yang disembunyiin
          for (let j = 0; j < 4; j++) {
            tabelHtml += `<td>${k[j] || ''}</td>`;
          }
          tabelHtml += '</tr>';
        }
        
        tabelHtml += '</table>';
        
        document.getElementById('tanggal-box').innerHTML = tanggalHtml || 'Tanggal tidak ditemukan';
        document.getElementById('hasil-box').innerHTML = tabelHtml;
      })
      .catch(error => {
        document.getElementById('tanggal-box').innerHTML = '';
        document.getElementById('hasil-box').innerHTML = 'Gagal memuat data.';
        console.error(error);
      });
  </script>
</body>
</html>
